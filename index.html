<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Négyzetméter kalkulátor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            color: green;
            font-weight: bold;
            white-space: pre-line;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Négyzetméter kalkulátor</h2>
    
    <label for="width">Szélesség (cm):</label>
    <input type="number" id="width" step="any" inputmode="decimal">

    <label for="height">Magasság (cm):</label>
    <input type="number" id="height" step="any" inputmode="decimal">

    <label for="price">Ár (egységár / m²):</label>
    <input type="number" id="price" step="any" inputmode="decimal">

    <button onclick="calculatePrice()">Számítás</button>

    <div id="result"></div>
</div>

<script>
function calculatePrice() {
    // Kiolvassuk az értékeket, és a biztonság kedvéért a vesszőket pontra cseréljük a háttérben
    let widthRaw = document.getElementById('width').value.replace(',', '.');
    let heightRaw = document.getElementById('height').value.replace(',', '.');
    let priceRaw = document.getElementById('price').value.replace(',', '.');

    const width = parseFloat(widthRaw);
    const height = parseFloat(heightRaw);
    const pricePerM2 = parseFloat(priceRaw);

    if (isNaN(width) || isNaN(height) || isNaN(pricePerM2)) {
        alert("Kérlek, csak számokat adj meg minden mezőben!");
        return;
    }

    let sqm = (width * height) / 10000;
    sqm = Math.max(sqm, 1.3);
    
    const totalPrice = sqm * pricePerM2;
    let priceText = "";

    if (totalPrice % 1 === 0) {
        priceText = totalPrice.toFixed(0) + " Ft";
    } else {
        priceText = totalPrice.toFixed(2) + " EUR";
    }

    document.getElementById('result').innerText = 
        `Számított méret: ${sqm.toFixed(2)} m²\nVégső ár: ${priceText}`;
}
</script>

</body>
</html>
